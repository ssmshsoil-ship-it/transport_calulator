<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운송비 포당 단가 계산기 | 2019</title>
<meta name="theme-color" content="#2d5a3d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="운송비계산기">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="로고최종.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e0dcd4;
  --border2: #ccc8c0;
  --text: #1a1916;
  --text2: #6b6860;
  --text3: #9c9890;
  --accent: #2d5a3d;
  --accent-light: #e8f0eb;
  --accent2: #c8572a;
  --red-light: #fdf0ec;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}
header {
  background: var(--accent);
  color: #fff;
  padding: 20px 32px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
header span { font-size: 12px; opacity: 0.65; font-family: var(--mono); }

.main { max-width: 1000px; margin: 0 auto; padding: 28px 24px; }

/* PANEL */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
}
.panel-head {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.panel-body { padding: 20px; }

/* FORM GRID */
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:700px){
  .grid-4, .grid-2 { grid-template-columns: 1fr 1fr; }
}
@media(max-width:480px){
  .grid-4 { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
}
.field { display: flex; flex-direction: column; gap: 6px; }
label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.4px; text-transform: uppercase; }
select, input[type=text], input[type=number] {
  height: 38px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0 11px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--surface);
  color: var(--text);
  transition: border-color .15s;
  width: 100%;
}
select:focus, input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(45,90,61,0.08);
}
.autocomplete { position: relative; }
.dropdown {
  position: absolute; top: 42px; left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 6px;
  z-index: 100;
  max-height: 220px;
  overflow-y: auto;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  display: none;
}
.dropdown-item {
  padding: 9px 12px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: var(--accent-light); color: var(--accent); }
.no-result { padding: 10px 12px; color: var(--text3); font-size: 13px; }

/* BUTTONS */
.btn-row { display: flex; gap: 10px; align-items: flex-end; margin-top: 4px; }
.btn {
  height: 38px; padding: 0 18px;
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  font-weight: 500;
  transition: all .15s;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  white-space: nowrap;
}
.btn:hover { background: var(--surface2); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: transparent;
  padding: 0 24px;
}
.btn-primary:hover { background: #234a31; }
.btn-clear { color: var(--text2); }

/* RESULT CARDS */
.result-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.rcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}
.rcard.highlight {
  background: var(--accent-light);
  border-color: var(--accent);
}
.rcard-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.3px; }
.rcard-val { font-size: 22px; font-weight: 600; font-family: var(--mono); color: var(--text); line-height: 1.2; }
.rcard.highlight .rcard-val { color: var(--accent); }
.rcard-unit { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  padding: 9px 12px;
  text-align: left;
  color: var(--text2);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  border-bottom: 2px solid var(--border2);
  background: var(--surface2);
}
td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
}
td.label-col { font-family: 'Noto Sans KR', sans-serif; color: var(--text2); }
tr:hover td { background: var(--accent-light); }
tr.selected-row td { background: #e8f0eb; font-weight: 600; }
tr.selected-row td.label-col { color: var(--accent); }
.tag {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.tag-ton { background: var(--accent2); }

/* NOTICE */
.notice {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.7;
}
.notice strong { color: var(--text); }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.empty .icon { font-size: 32px; margin-bottom: 10px; }
.empty p { font-size: 13px; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 18px 0; }

footer {
  text-align: center;
  padding: 20px;
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
}
</style>
</head>
<body>

<header>
  <h1>🚛 운송비 포당 단가 계산기</h1>
  <span>2019년 기준 | 전국 운송비 단가표</span>
</header>

<div class="main">

  <!-- 입력 패널 -->
  <div class="panel">
    <div class="panel-head">운송 조건 입력</div>
    <div class="panel-body">
      <div class="grid-4" style="margin-bottom:14px">
        <div class="field">
          <label>출발지</label>
          <select id="dep" onchange="onDepChange()">
            <option value="">선택하세요</option>
            <option value="벌교">벌교</option>
            <option value="홍성">홍성 (참그루)</option>
            <option value="괴산">괴산 (신성)</option>
            <option value="경주포항">경주/포항</option>
            <option value="장흥">장흥 (흙고은)</option>
            <option value="정읍">정읍 (동부한농)</option>
            <option value="부안">부안 (신성)</option>
          </select>
        </div>
        <div class="field">
          <label>도착지</label>
          <div class="autocomplete">
            <input type="text" id="dest-input" placeholder="검색..." oninput="onDestInput()" onfocus="onDestInput()" autocomplete="off"/>
            <div class="dropdown" id="dest-dropdown"></div>
          </div>
        </div>
        <div class="field">
          <label>차량 톤수</label>
          <select id="ton-type" onchange="onTonChange()">
            <option value="">선택하세요</option>
          </select>
        </div>
        <div class="field">
          <label>제품 종류</label>
          <select id="product" onchange="calcResult()">
            <option value="">선택하세요 (선택 시 포당단가)</option>
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label>포수</label>
          <input type="number" id="bags" placeholder="포수 입력 (예: 1200)" oninput="calcResult()" min="1"/>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="calcResult()">계산하기</button>
            <button class="btn btn-clear" onclick="clearAll()">초기화</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 결과 영역 -->
  <div id="result-area"></div>

  <!-- 안내 -->
  <div class="notice">
    <strong>사용 안내</strong><br>
    · 차량 운송비(원): 차량 1대 기준 총 운송비입니다.<br>
    · 포당 단가(원/포): 제품 1포당 운송 단가입니다. 제품 종류를 선택하면 확인할 수 있습니다.<br>
    · 포수를 입력하면 총 운송비와 역산 포당 단가를 함께 계산합니다.
  </div>
</div>

<footer>운송비 단가표 2019년 기준 · 실제 견적은 담당자에게 확인하세요</footer>

function shouldSkip(k) { return SKIP_COLS.some(s => k.includes(s)); }

function onDepChange() {
  const dep = document.getElementById('dep').value;
  const tonSel = document.getElementById('ton-type');
  const prodSel = document.getElementById('product');
  const destInput = document.getElementById('dest-input');
  destInput.value = '';
  document.getElementById('dest-dropdown').style.display = 'none';
  tonSel.innerHTML = '<option value="">선택하세요</option>';
  prodSel.innerHTML = '<option value="">선택하세요 (선택 시 포당단가)</option>';
  document.getElementById('result-area').innerHTML = '';
  if (!dep || !META[dep]) return;
  META[dep].ton_cols.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c; tonSel.appendChild(o);
  });
  META[dep].prod_cols.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c; prodSel.appendChild(o);
  });
}

function onDestInput() {
  const dep = document.getElementById('dep').value;
  const val = document.getElementById('dest-input').value;
  const dd = document.getElementById('dest-dropdown');
  if (!dep || !DATA[dep]) { dd.style.display = 'none'; return; }
  const dests = Object.keys(DATA[dep]);
  const filtered = val ? dests.filter(d => d.includes(val)) : dests;
  if (!filtered.length) {
    dd.innerHTML = '<div class="no-result">검색 결과 없음</div>';
  } else {
    dd.innerHTML = filtered.slice(0, 80).map(d =>
      `<div class="dropdown-item" onclick="selectDest('${d.replace(/'/g,"\'")}')"> ${d}</div>`
    ).join('');
  }
  dd.style.display = 'block';
}

function selectDest(d) {
  document.getElementById('dest-input').value = d;
  document.getElementById('dest-dropdown').style.display = 'none';
  calcResult();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete')) document.getElementById('dest-dropdown').style.display = 'none';
});

function onTonChange() { calcResult(); }

function calcResult() {
  const dep = document.getElementById('dep').value;
  const dest = document.getElementById('dest-input').value.trim();
  const ton = document.getElementById('ton-type').value;
  const product = document.getElementById('product').value;
  const bags = parseInt(document.getElementById('bags').value) || 0;

  const area = document.getElementById('result-area');

  if (!dep || !dest) { area.innerHTML = ''; return; }
  if (!DATA[dep] || !DATA[dep][dest]) {
    area.innerHTML = `<div class="panel"><div class="panel-body"><div class="empty"><div class="icon">🔍</div><p><strong>${dep} → ${dest}</strong> 구간 데이터가 없습니다.</p></div></div></div>`;
    return;
  }

  const row = DATA[dep][dest];
  const tonCost = ton ? row[ton] : null;
  const perBag = product ? row[product] : null;

  // SUMMARY CARDS
  let cards = '';
  if (tonCost) {
    cards += `<div class="rcard"><div class="rcard-label">차량 운송비 (${ton})</div><div class="rcard-val">${Math.round(tonCost).toLocaleString()}</div><div class="rcard-unit">원</div></div>`;
  }
  if (perBag) {
    cards += `<div class="rcard highlight"><div class="rcard-label">포당 단가 (${product})</div><div class="rcard-val">${Math.round(perBag).toLocaleString()}</div><div class="rcard-unit">원 / 포</div></div>`;
  }
  if (bags > 0 && perBag) {
    const total = Math.round(bags * perBag);
    cards += `<div class="rcard highlight"><div class="rcard-label">총 운송비 (${bags.toLocaleString()}포)</div><div class="rcard-val">${total.toLocaleString()}</div><div class="rcard-unit">원</div></div>`;
  }
  if (bags > 0 && tonCost && !perBag) {
    const calc = Math.round(tonCost / bags);
    cards += `<div class="rcard"><div class="rcard-label">환산 포당단가 (${bags.toLocaleString()}포)</div><div class="rcard-val">${calc.toLocaleString()}</div><div class="rcard-unit">원 / 포</div></div>`;
  }
  if (!cards) {
    cards = `<div class="rcard"><div class="rcard-label">안내</div><div class="rcard-val" style="font-size:14px;font-family:var(--noto)">톤수 또는 제품을 선택하세요</div></div>`;
  }

  // FULL TABLE
  let rows = '';
  const EXCLUDE = ["하차비","하역비","통합명칭","검증","18톤검증","경량 하역비","준준량"];
  Object.entries(row).forEach(([k, v]) => {
    if (EXCLUDE.some(s => k.includes(s))) return;
    const isTon = META[dep].ton_cols.includes(k);
    const isProd = META[dep].prod_cols.includes(k);
    const isSelected = k === ton || k === product;
    const unit = isTon ? '원' : (isProd ? '원/포' : '원');
    const badge = isTon ? '<span class="tag tag-ton">차량</span>' : (isProd ? '<span class="tag">포당</span>' : '');
    const val = typeof v === 'number' ? Math.round(v).toLocaleString() : v;
    rows += `<tr class="${isSelected ? 'selected-row' : ''}">
      <td class="label-col">${k} ${badge}</td>
      <td style="text-align:right">${val}</td>
      <td style="text-align:right;color:var(--text2)">${unit}</td>
    </tr>`;
  });

  area.innerHTML = `
    <div class="result-cards">${cards}</div>
    <div class="panel">
      <div class="panel-head">${dep} → ${dest} · 전체 단가표</div>
      <div class="panel-body" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead><tr><th>항목</th><th style="text-align:right">단가</th><th style="text-align:right">단위</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function clearAll() {
  document.getElementById('dep').value = '';
  document.getElementById('dest-input').value = '';
  document.getElementById('ton-type').innerHTML = '<option value="">선택하세요</option>';
  document.getElementById('product').innerHTML = '<option value="">선택하세요 (선택 시 포당단가)</option>';
  document.getElementById('bags').value = '';
  document.getElementById('result-area').innerHTML = '';
}
